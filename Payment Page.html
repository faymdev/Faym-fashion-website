<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Payment</title>
 <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="style.css" />

<style>
/* ======= GENERAL STYLING ======= */
body {
  margin: 0;
  padding: 0;
  background: #f5f5f5;
  font-family: Arial, sans-serif;
}

.payment-wrapper {
  max-width: 480px;
  margin: 50px auto;
  background: #fff;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  position: relative;
}

h2 {
  text-align: center;
  margin-bottom: 25px;
}

/* ======= FORM ======= */
label {
  display: block;
  font-weight: 600;
  margin-bottom: 6px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 18px;
  border: 1px solid #ccc;
  border-radius: 10px;
  font-size: 1rem;
}

.btn-pay {
  width: 100%;
  padding: 14px;
  border: none;
  background: #000;
  color: #fff;
  font-size: 1rem;
  border-radius: 12px;
  cursor: pointer;
  margin-top: 10px;
}
.btn-pay:disabled {
  background: #444;
}

/* SUCCESS BOX */
.success-box {
  display: none;
  text-align: center;
  background: #e7ffe7;
  color: #0a7a0a;
  padding: 18px;
  border-radius: 10px;
  margin-top: 20px;
  border: 1px solid #b5f5b5;
}

/* ======= ORDER ANIMATION WRAPPER ======= */
.order {
  width: 100%;
  height: 80px;
  margin-top: 20px;
  display: none;
  position: relative;
  overflow: hidden;
  background: #fffdf5;
  border: 1px solid #eee;
  border-radius: 12px;
}

/* ======= TRUCK ANIMATION ======= */
.order .truck {
  width: 60px;
  height: 41px;
  position: absolute;
  top: 20px;
  left: -80px;
  z-index: 5;
  background-image: url('https://cdn-icons-png.flaticon.com/512/743/743131.png');
  background-size: contain;
  background-repeat: no-repeat;
  transform: translateX(0);
  animation: none;
}

@keyframes drive {
  0%   { transform: translateX(0); }
  100% { transform: translateX(500px); }
}
</style>
</head>

<body>

     <!-- Topbar -->
  <div class="topbar">
    <div class="container topbar-inner">
        <!-- top bar socials -->
      <div class="socials">
  <a href="#" aria-label="Facebook" class="icon" target="_blank">
    <img src="image/facebook-svgrepo-com.svg" alt="Facebook">
  </a>
  <a href="#" aria-label="Twitter" class="icon" target="_blank">
    <img src="image/twitter-svgrepo-com.svg" alt="Twitter">
  </a>
  <a href="#" aria-label="Pinterest" class="icon" target="_blank">
    <img src="image/pintrest-svgrepo-com.svg" alt="Pinterest">
  </a>
  <a href="#" aria-label="Instagram" class="icon" target="_blank">
    <img src="image/instagram-167-svgrepo-com.svg" alt="Instagram">
  </a>
</div>



      <div class="auth">
        <a href="account.html">Log In</a> | <a href="account.html">Register Account</a>
      </div>
    </div>
  </div>

  <!-- Header / Nav -->
  <header class="site-header">
    <div class="container header-inner">
     <a class="logo" href="index.html">
  <span class="logo-text">FAYM</span>
  <span class="logo-cart">🛍️</span>
</a>


      <nav class="main-nav" id="mainNav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="shop.html">Shop</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="blog.html">Blog</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>

      <div class="header-actions">
        <button class="cart-btn" aria-label="View cart">
          <span class="cart-icon">🛒</span>
          <span class="cart-count">0</span>
        </button>

        <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
          ☰
        </button>
      </div>
    </div>
  </header>






<div class="payment-wrapper">

  <h2>Secure Payment</h2>

  <label>Full Name</label>
  <input type="text" id="fullname" placeholder="John Doe">

  <label>Email Address</label>
  <input type="email" id="email" placeholder="you@example.com">

  <label>Payment Method</label>
  <select id="method">
    <option value="credit">Credit / Debit Card</option>
    <option value="transfer">Bank Transfer</option>
    <option value="wallet">Mobile Wallet</option>
  </select>

  <label>Card Number</label>
  <input type="text" id="card" placeholder="1234 5678 9012 3456">

  <label>Expiration Date</label>
  <input type="text" id="exp" placeholder="MM/YY">

  <label>CVV</label>
  <input type="text" id="cvv" placeholder="123">

  <button class="btn-pay" onclick="simulatePayment()">Pay Now</button>

  <div class="success-box" id="successBox">
    ✔ Payment Successful!<br>Thank you for your order.
  </div>

  <!-- ORDER ANIMATION BOX -->
  <div class="order" id="orderBox">
    <div class="truck"></div>
  </div>

</div>

  <script>
function simulatePayment() {
  const btn = document.querySelector(".btn-pay");
  const successBox = document.getElementById("successBox");
  const orderBox = document.getElementById("orderBox");
  const truck = document.querySelector(".truck");

  btn.innerText = "Processing...";
  btn.disabled = true;

  // Simulate processing
  setTimeout(() => {
    successBox.style.display = "block";
    orderBox.style.display = "block";

    // Start truck animation
    truck.style.animation = "drive 2.5s linear forwards";

    // Change button text
    btn.innerText = "Paid ✔";
  }, 1500);
}
</script>

</body>
</html>
